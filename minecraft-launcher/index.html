<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Minecraft Launcher - szkic</title>
    <style>
      body { font-family: sans-serif; padding: 16px }
      button { margin-right: 8px }
      #log { width: 100%; height: 200px }
      .row { margin-bottom: 8px }
    </style>
  </head>
  <body>
    <h2>Rivlas Launcher — wersje, konta, mody</h2>
    <div>
      <button id="tabVersions">Wersje</button>
      <button id="tabAccounts">Konta</button>
      <button id="tabMods">Mody</button>
    </div>

    <div id="viewVersions" class="view">
      <div class="row">
        <label>Wybierz wersję:</label>
        <select id="versionSelect" style="width:60%"></select>
        <button id="installVersionBtn">Zainstaluj</button>
        <button id="launchVersionBtn">Uruchom</button>
      </div>
      <div class="row">
        <label>Profil JVM (opcjonalne):</label>
        <input id="jvmArgs" style="width:60%" placeholder="np. -Xmx4G -XX:+UseG1GC" />
      </div>
      <div>
        <label>Log:</label>
        <textarea id="log" readonly></textarea>
      </div>
    </div>

    <div id="viewAccounts" class="view" style="display:none">
      <div class="row">
        <label>ID konta:</label>
        <input id="accId" />
        <label>Username:</label>
        <input id="accName" />
        <label>AccessToken:</label>
        <input id="accToken" />
        <button id="addAccBtn">Dodaj konto</button>
      </div>
      <div class="row">
        <label>Konta:</label>
        <select id="accSelect" style="width:60%"></select>
        <button id="setActiveAccBtn">Ustaw aktywne</button>
        <button id="removeAccBtn">Usuń</button>
      </div>
    </div>

    <div id="viewMods" class="view" style="display:none">
      <div class="row">
        <label>URL moda (.jar):</label>
        <input id="modUrl" style="width:60%" />
        <label>Nazwa pliku (opcjonalnie):</label>
        <input id="modFile" />
        <button id="installModBtn">Zainstaluj moda</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
